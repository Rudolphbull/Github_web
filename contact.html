<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Christensen Heights</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="images/christensen_heights_logo.png">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="./images/christensen_heights_logo (1).jfif" width="70" height="70">
    </a>

    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
      <li class="nav-item"><a class="nav-link" href="services.html">Solutions</a></li>
      <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
    </ul>
  </div>
</nav>

<section class="hero-section d-flex align-items-center">
  <div class="container text-white text-center">
    <h1 class="fw-bold">Contact Us</h1>
    <p class="lead">We respond within 24 hours</p>
  </div>
</section>

<section class="py-5">
  <div class="container">

    <div class="row g-5">

      <!-- Contact Form -->
      <div class="col-md-6">
        <h4>Send a Message</h4>
        <form>
          <input class="form-control mb-3" placeholder="Name">
          <input class="form-control mb-3" placeholder="Email">
          <textarea class="form-control mb-3" placeholder="Message"></textarea>
          <button class="btn btn-success w-100">Send Message</button>
        </form>
      </div>

      <!-- Consultation Form -->
      <div class="col-md-6">
        <h4>Book Consultation</h4>
        <form>
          <input class="form-control mb-3" placeholder="Company Name">
          <input class="form-control mb-3" placeholder="Phone">
          <select class="form-control mb-3">
            <option>Recruitment</option>
            <option>Payroll</option>
            <option>HR Advisory</option>
          </select>
          <textarea class="form-control mb-3" placeholder="Details"></textarea>
          <button class="btn btn-dark w-100">Book Now</button>
        </form>
      </div>

    </div>

  </div>
</section>

</body>
</html>
